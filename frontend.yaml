apiVersion: v1
kind: ConfigMap
metadata:
  name: web-frontend-config
data:
  index.html: |
    <html>
      <body style="background-color: #1a1a1a; color: #00ff00; font-family: monospace; text-align: center; padding-top: 50px;">
        <h1>Optima College Security Infrastructure</h1>
        <p>System Status: SECURE</p>
        <p>Active Defense System: ONLINE</p>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      containers:
      - name: web
        image: nginx:alpine
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: web-frontend-config
